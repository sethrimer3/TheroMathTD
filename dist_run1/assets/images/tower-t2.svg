<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="t2Glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d0a0ff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#9060cc" stop-opacity="0.2" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0c13" />
  <circle cx="32" cy="32" r="22" fill="#0d1020" stroke="#c080ff" stroke-width="1.5" opacity="0.85" />

  <!-- Parametric circle approximation (cos t, sin t) -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#c080ff" stroke-width="1.2" opacity="0.5" />

  <!-- Axis lines suggesting x and y parametric components -->
  <line x1="19" y1="32" x2="45" y2="32" stroke="#a060e0" stroke-width="0.8" opacity="0.4" stroke-dasharray="2,2" />
  <line x1="32" y1="19" x2="32" y2="45" stroke="#a060e0" stroke-width="0.8" opacity="0.4" stroke-dasharray="2,2" />

  <!-- Trig labels — small sin / cos hints -->
  <text x="46" y="34" font-family="serif" font-size="5" fill="#c080ff" opacity="0.7">cos</text>
  <text x="33" y="18" font-family="serif" font-size="5" fill="#c080ff" opacity="0.7">sin</text>

  <!-- Glowing tracer head (animated along the circle) -->
  <circle r="3.5" fill="url(#t2Glow)" opacity="0.95">
    <animateMotion
      dur="3.5s"
      repeatCount="indefinite"
      path="M13,0 A13,13 0 1,1 12.99,-0.1 Z"
    />
    <animate attributeName="opacity" values="0.9;1;0.7;1;0.9" dur="1.5s" repeatCount="indefinite" />
  </circle>

  <!-- Tower label -->
  <text
    x="32"
    y="37"
    font-family="'Cormorant Garamond', serif"
    font-size="14"
    text-anchor="middle"
    fill="#ffffff"
    stroke="#000000"
    stroke-width="1"
    paint-order="stroke"
  >T₂</text>
</svg>
