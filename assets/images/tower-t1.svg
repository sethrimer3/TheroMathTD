<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="t1Glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a8f0ff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#5be0ff" stop-opacity="0.2" />
    </radialGradient>
    <!-- Rose curve approximation: 3-petal polar rose r = sin(3θ) scaled into the icon -->
    <!-- Petal 1: upper right -->
    <path id="petal1" d="M32,32 Q40,10 32,14 Q24,18 32,32" fill="none" stroke="#8af7ff" stroke-width="1.3" opacity="0.8" />
    <!-- Petal 2: lower right -->
    <path id="petal2" d="M32,32 Q54,40 52,32 Q50,24 32,32" fill="none" stroke="#a8c0ff" stroke-width="1.3" opacity="0.8" />
    <!-- Petal 3: lower left -->
    <path id="petal3" d="M32,32 Q10,40 12,50 Q14,58 32,32" fill="none" stroke="#ffb8f0" stroke-width="1.3" opacity="0.8" />
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0a0c13" />
  <circle cx="32" cy="32" r="22" fill="#0d1420" stroke="#8af7ff" stroke-width="1.5" opacity="0.85" />

  <!-- Polar rose outline paths -->
  <!-- 3-petal rose r = sin(3θ) traced as a polyline; 36 sample points mapped from polar to SVG coords -->
  <polyline
    fill="none"
    stroke="#8af7ff"
    stroke-width="1.2"
    opacity="0.6"
    points="32,32 35.2,28.8 37.9,26.3 39.5,25.2 39.6,25.9 38.2,28.1 35.6,31.2 32,32 28.4,31.2 25.8,28.1 24.4,25.9 24.5,25.2 26.1,26.3 28.8,28.8 32,32 32.9,35.9 32.3,39.5 30.4,42.2 27.8,43.3 25.2,42.4 23.4,39.9 23.3,36.3 25.3,33 28.7,31.3 32,32 35.3,31.3 38.7,33 40.7,36.3 40.6,39.9 38.8,42.4 36.2,43.3 33.6,42.2 31.7,39.5 31.1,35.9 32,32"
  />

  <!-- Glowing tracer head (animated) -->
  <circle cx="32" cy="32" r="3.5" fill="url(#t1Glow)" opacity="0.95">
    <animateMotion
      dur="4s"
      repeatCount="indefinite"
      path="M0,0 Q3.2,-3.2 5.9,-5.7 Q7.5,-6.8 7.6,-6.1 Q6.2,-3.9 3.6,-0.8 Q0,-0 -3.6,-0.8 Q-6.2,-3.9 -7.6,-6.1 Q-7.5,-6.8 -5.9,-5.7 Q-3.2,-3.2 0,0 Q0.9,3.9 0.3,7.5 Q-1.6,10.2 -4.2,11.3 Q-6.8,10.4 -8.6,7.9 Q-8.7,4.3 -6.7,1 Q-3.3,-0.7 0,0 Q3.3,-0.7 6.7,1 Q8.7,4.3 8.6,7.9 Q6.8,10.4 4.2,11.3 Q1.6,10.2 -0.3,7.5 Q-0.9,3.9 0,0"
    />
    <animate attributeName="opacity" values="0.9;1;0.7;1;0.9" dur="1.5s" repeatCount="indefinite" />
  </circle>

  <!-- Tower label -->
  <text
    x="32"
    y="37"
    font-family="'Cormorant Garamond', serif"
    font-size="14"
    text-anchor="middle"
    fill="#ffffff"
    stroke="#000000"
    stroke-width="1"
    paint-order="stroke"
  >T₁</text>
</svg>
